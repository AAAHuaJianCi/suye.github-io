<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>我的星空博客 | 测试</title>
<style>
* {margin: 0;padding: 0;box-sizing: border-box;}
body {color:#fff;font-family:微软雅黑,sans-serif;}
/* 动态星空背景 */
#starBg{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:#000518;
  z-index:-1;
}
/* 居中卡片 */
.box{
  width:90%;
  max-width:600px;
  margin:120px auto;
  padding:40px;
  background:rgba(30, 40, 80, 0.25);
  backdrop-filter:blur(10px);
  border:1px solid rgba(255,255,255,0.15);
  border-radius:16px;
  text-align:center;
}
h1{
  color:#c0d8ff;
  margin-bottom:20px;
}
p{
  color:#b0c4de;
  line-height:1.8;
}
</style>
</head>
<body>

<!-- 动态星空背景画布 -->
<canvas id="starBg"></canvas>

<div class="box">
    <h1>🌌 星空博客 测试成功</h1>
    <p>GitHub Pages 已经正常部署</p>
    <p>后续会加入：</p>
    <p>首页 · 文章 · Unity游戏开发历程</p>
</div>

<script>
// 极简动态星空
const canvas = document.getElementById('starBg');
const ctx = canvas.getContext('2d');
let w,h,stars=[];

function resize(){
    w = canvas.width = innerWidth;
    h = canvas.height = innerHeight;
}
resize();
window.onresize = resize;

class Star{
    constructor(){
        this.x = Math.random()*w;
        this.y = Math.random()*h;
        this.r = Math.random()*1.2;
        this.s = Math.random()*0.2;
        this.a = Math.random();
    }
    update(){
        this.y += this.s;
        if(this.y>h){this.y=0;this.x=Math.random()*w;}
        ctx.beginPath();
        ctx.arc(this.x,this.y,this.r,0,Math.PI*2);
        ctx.fillStyle=`rgba(255,255,255,${this.a})`;
        ctx.fill();
    }
}

for(let i=0;i<300;i++) stars.push(new Star());

function animate(){
    ctx.clearRect(0,0,w,h);
    stars.forEach(v=>v.update());
    requestAnimationFrame(animate);
}
animate();
</script>

</body>
</html>
