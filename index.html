<!DOCTYPE html>
<!-- HTML5 标准文档声明 -->
<html lang="zh-CN">
<head>
    <!-- 字符编码：防止中文乱码 -->
    <meta charset="UTF-8">
    <!-- 移动端自适应配置 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- 网页标题 -->
    <title>星空个人博客 | 首页</title>
    <style>
        /* ========== 全局样式初始化 ========== */
        * {
            margin: 0;
            padding: 0;
            /* 统一盒模型，边框内缩 */
            box-sizing: border-box;
        }

        body {
            /* 全局字体 */
            font-family: "Microsoft YaHei", sans-serif;
            /* 默认文字白色 */
            color: #ffffff;
            /* 禁止页面滚动 */
            overflow: hidden;
        }

        /* ========== 动态星空背景画布 ========== */
        #starBg {
            /* 固定定位，永久垫底 */
            position: fixed;
            top: 0;
            left: 0;
            /* 铺满全屏 */
            width: 100%;
            height: 100%;
            /* 深空底色 */
            background-color: #000412;
            /* 层级最低，不遮挡内容 */
            z-index: -1;
        }

        /* ========== 顶部导航栏 ========== */
        .nav {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 70px;
            /* 横向居中排列 */
            display: flex;
            justify-content: center;
            align-items: center;
            /* 顶部渐变透明遮罩 */
            background: linear-gradient(rgba(0,0,0,0.4), transparent);
            z-index: 10;
        }

        /* 导航链接样式 */
        .nav a {
            color: #c5d8f8;
            text-decoration: none;
            font-size: 16px;
            margin: 0 22px;
            /* 过渡动画 */
            transition: 0.3s ease;
        }

        /* 导航悬浮+选中效果 */
        .nav a:hover,
        .nav a.active {
            color: #fff;
            text-shadow: 0 0 10px #94b8ff;
        }

        /* ========== 主体内容容器 ========== */
        .container {
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 25px;
            padding-top: 30px;
        }

        /* ========== 毛玻璃卡片通用样式 ========== */
        .card {
            width: 230px;
            height: 160px;
            /* 半透明背景 */
            background: rgba(40, 60, 110, 0.18);
            /* 毛玻璃模糊 */
            backdrop-filter: blur(12px);
            /* 细边框 */
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 18px;
            color: #e0edff;
            /* 悬浮上浮动画 */
            transition: transform 0.3s;
            cursor: pointer;
        }

        /* 卡片悬浮效果 */
        .card:hover {
            transform: translateY(-8px);
            box-shadow: 0 8px 25px rgba(100, 150, 255, 0.15);
        }
    </style>
</head>
<body>

    <!-- 动态星空画布 - 核心背景 -->
    <canvas id="starBg"></canvas>

    <!-- 顶部导航栏 -->
    <div class="nav">
        <a href="index.html" class="active">首页</a>
        <a href="#">随笔</a>
        <a href="#">Web学习</a>
        <a href="#">Unity游戏历程</a>
    </div>

    <!-- 首页三大板块卡片 -->
    <div class="container">
        <div class="card">📖 随笔</div>
        <div class="card">💻 Web学习</div>
        <div class="card">🎮 Unity游戏历程</div>
    </div>


    <script>
        // ========== 动态星空 JS ==========
        // 获取画布元素
        const canvas = document.getElementById('starBg');
        // 获取2D绘图上下文
        const ctx = canvas.getContext('2d');

        // 定义变量：画布宽、高、星星数组
        let winW, winH;
        let stars = [];

        // 初始化画布大小 = 窗口大小
        function setSize() {
            winW = canvas.width = window.innerWidth;
            winH = canvas.height = window.innerHeight;
        }
        setSize();
        // 窗口大小改变时重设画布
        window.addEventListener('resize', setSize);

        // 星星构造函数
        class Star {
            constructor() {
                // 初始化星星属性
                this.x = Math.random() * winW;     // 随机横向坐标
                this.y = Math.random() * winH;     // 随机纵向坐标
                this.r = Math.random() * 1.5;      // 随机大小
                this.speed = Math.random() * 0.25; // 随机下落速度
                this.alpha = Math.random();        // 随机透明度
            }

            // 更新星星位置
            update() {
                this.y += this.speed;
                // 星星划出底部，重置到顶部循环
                if (this.y > winH) {
                    this.y = 0;
                    this.x = Math.random() * winW;
                }
            }

            // 绘制单个星星
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 255, 255, ${this.alpha})`;
                ctx.fill();
            }
        }

        // 创建350颗星星
        for(let i = 0; i < 600; i++){
            stars.push(new Star());
        }

        // 动画循环
        function animate() {
            // 清除上一帧画面
            ctx.clearRect(0, 0, winW, winH);
            // 遍历所有星星：更新位置 + 绘制
            stars.forEach(item => {
                item.update();
                item.draw();
            });
            // 持续递归调用，实现动态效果
            requestAnimationFrame(animate);
        }
        // 启动星空动画
        animate();
    </script>

</body>
</html>
